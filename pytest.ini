[pytest]
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts = -v --strict-markers --cov=src/core_llm_bridge --cov-report=term-missing --cov-report=html --cov-report=xml
markers =
    unit: unit tests
    integration: integration tests
    requires_ollama: tests that require Ollama running
    asyncio: asynchronous tests
asyncio_mode = auto
